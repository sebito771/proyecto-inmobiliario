<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Restablecer contraseña</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Arial, sans-serif; background: #f4f4f4; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
    .card { background: #fff; border-radius: 10px; box-shadow: 0 4px 16px rgba(0,0,0,0.12); padding: 48px 40px; max-width: 440px; width: 100%; text-align: center; }
    .icon { font-size: 56px; margin-bottom: 16px; }
    h1 { font-size: 22px; margin-bottom: 12px; color: #222; }
    p  { font-size: 15px; color: #555; line-height: 1.6; margin-bottom: 8px; }
    label { display: block; text-align: left; font-size: 14px; color: #444; margin: 12px 0 4px; }
    input[type="password"] {
      width: 100%; padding: 10px 14px; border: 1px solid #ccc; border-radius: 6px;
      font-size: 15px; outline: none; transition: border-color .2s;
    }
    input[type="password"]:focus { border-color: #e84040; }
    .btn { display: inline-block; margin-top: 24px; width: 100%; padding: 12px; background: #e84040; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn:hover { background: #b71c1c; }
    #feedback { margin-top: 16px; font-size: 14px; }
    .success { color: #2e7d32; }
    .error   { color: #c62828; }
    #form-section { margin-top: 8px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🔒</div>
    <h1>Restablecer contraseña</h1>
    <p>Ingresa tu nueva contraseña a continuación.</p>

    <div id="form-section">
      <label for="pwd">Nueva contraseña</label>
      <input type="password" id="pwd" placeholder="••••••••" />
      <label for="pwd2">Confirmar contraseña</label>
      <input type="password" id="pwd2" placeholder="••••••••" />
      <button class="btn" id="submit-btn">Cambiar contraseña</button>
    </div>

    <p id="feedback"></p>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const token  = params.get("token");

    if (!token) {
      document.getElementById("form-section").style.display = "none";
      const fb = document.getElementById("feedback");
      fb.textContent = "Enlace inválido o token no proporcionado.";
      fb.className   = "error";
    }

    document.getElementById("submit-btn").addEventListener("click", async () => {
      const pwd  = document.getElementById("pwd").value;
      const pwd2 = document.getElementById("pwd2").value;
      const fb   = document.getElementById("feedback");

      if (!pwd || pwd.length < 6) {
        fb.textContent = "La contraseña debe tener al menos 6 caracteres.";
        fb.className   = "error";
        return;
      }
      if (pwd !== pwd2) {
        fb.textContent = "Las contraseñas no coinciden.";
        fb.className   = "error";
        return;
      }

      try {
        const res = await fetch(`/auth/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, new_password: pwd }),
        });
        const data = await res.json().catch(() => ({}));

        if (res.ok) {
          document.getElementById("form-section").style.display = "none";
          fb.textContent = data.message ?? "¡Contraseña actualizada exitosamente! Ya puedes iniciar sesión.";
          fb.className   = "success";
        } else {
          throw new Error(data.detail ?? "Error al cambiar la contraseña");
        }
      } catch (err) {
        fb.textContent = err.message;
        fb.className   = "error";
      }
    });
  </script>
</body>
</html>
